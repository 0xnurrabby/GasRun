<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maintenance</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Arial,sans-serif;
      background:#f2f6ff;
      color:#111;
      text-align:center;
      padding:24px;
    }
    .card{
      max-width:560px;
      background:white;
      padding:32px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    h1{margin:0 0 12px;font-size:32px}
    p{margin:0;font-size:18px;opacity:.8}
  </style>
</head>
<body>
  <div class="card">
    <h1>We’ll be back soon</h1>
    <p>GasRun is under maintenance. Please check back in a little while.</p>
  </div>
</body>
</html>
